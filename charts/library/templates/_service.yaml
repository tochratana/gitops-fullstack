{{- define "library.service" -}}
{{- $ := index . 0 }}
{{- $component := index . 1 }}
{{- $values := index . 2 }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-%s" $.Release.Name $component }}
  labels:
    {{- include "library.commonLabels" (list $ $component) | nindent 4 }}
spec:
  type: {{ $values.service.type | default "ClusterIP" }}
  ports:
    {{- range $values.service.ports }}
    - port: {{ .port }}
      targetPort: {{ .targetPort | default .name }}
      protocol: {{ .protocol | default "TCP" }}
      name: {{ .name }}
      {{- if .nodePort }}
      nodePort: {{ .nodePort }}
      {{- end }}
    {{- end }}
  selector:
    {{- include "library.commonLabels" (list $ $component) | nindent 4 }}
{{- end }}