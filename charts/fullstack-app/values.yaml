# Default values for fullstack-app
# This is a YAML-formatted file.

replicaCount: 1

images:
  frontend:
    repository: your-registry/frontend
    tag: latest
    pullPolicy: Always
  backend:
    repository: your-registry/backend
    tag: latest
    pullPolicy: Always
  postgres:
    repository: postgres
    tag: "15-alpine"
    pullPolicy: IfNotPresent

service:
  frontend:
    type: ClusterIP
    port: 3000
  backend:
    type: ClusterIP
    port: 8080
  postgres:
    type: ClusterIP
    port: 5432

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
          backend:
            service: frontend
        - path: /api
          pathType: Prefix
          backend:
            service: backend
  tls:
    - secretName: app-tls
      hosts:
        - app.example.com

postgresql:
  enabled: true
  auth:
    username: appuser
    database: appdb
    existingSecret: postgres-secret
  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard

config:
  frontend:
    NEXT_PUBLIC_API_URL: /api
    NEXT_PUBLIC_APP_NAME: MyApp
  backend:
    SPRING_PROFILES_ACTIVE: k8s
    LOGGING_LEVEL_COM_EXAMPLE: DEBUG
    SERVER_PORT: 8080

resources:
  frontend:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  backend:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  postgres:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"