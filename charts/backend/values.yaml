# Backend specific values
replicaCount: 1

image:
  repository: your-registry/backend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

ports:
  - name: http
    containerPort: 8080

config:
  SPRING_PROFILES_ACTIVE: k8s
  LOGGING_LEVEL_COM_EXAMPLE: DEBUG
  SERVER_PORT: "8080"

envFrom:
  - configMapRef:
      name: {{ .Release.Name }}-backend-config

env:
  - name: SPRING_DATASOURCE_URL
    value: jdbc:postgresql://{{ .Release.Name }}-postgres:5432/{{ .Values.database.name }}
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: {{ .Release.Name }}-postgres-secret
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: {{ .Release.Name }}-postgres-secret
        key: password

probes:
  liveness:
    httpGet:
      path: /actuator/health
      port: http
    initialDelaySeconds: 60
    periodSeconds: 10
  readiness:
    httpGet:
      path: /actuator/health/readiness
      port: http
    initialDelaySeconds: 30
    periodSeconds: 5

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

database:
  name: appdb