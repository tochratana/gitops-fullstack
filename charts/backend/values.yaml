# Backend specific values
replicaCount: 1

image:
  repository: tochratana/prod-api
  tag: "01d931c2"
  pullPolicy: Always

service:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

ports:
  - name: http
    containerPort: 8080

config:
  SPRING_PROFILES_ACTIVE: k8s
  LOGGING_LEVEL_COM_EXAMPLE: DEBUG
  SERVER_PORT: "8080"

# env and envFrom are injected by the template using .Release.Name — do not use
# Go template expressions here (values.yaml is never rendered by Helm).
# These are set via the backend.yaml template which passes dynamic names.
envFrom: []

env: []

probes:
  startup:
    httpGet:
      path: /actuator/health/liveness
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 12       # allows up to 30 + (12×10) = 150s for startup
    timeoutSeconds: 5
  liveness:
    httpGet:
      path: /actuator/health/liveness
      port: http
    initialDelaySeconds: 0     # startupProbe handles the wait
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  readiness:
    httpGet:
      path: /actuator/health/readiness
      port: http
    initialDelaySeconds: 0     # startupProbe handles the wait
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 5


resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

database:
  name: blog_db
