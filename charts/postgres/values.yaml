# PostgreSQL specific values
replicaCount: 1

image:
  repository: postgres
  tag: "15-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP

ports:
  - name: postgres
    containerPort: 5432

persistence:
  enabled: true
  size: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClass: ""

auth:
  username: appuser
  database: blog_db
  password: "StrongP@ssw0rd2026"  # Fixed password — change this for production

# env, secretData, volumes, and probes use .Release.Name — injected dynamically
# by postgres.yaml template. Do NOT use Go template expressions here;
# values.yaml is static YAML and is never rendered by Helm's template engine.
env: []
secretData: {}
volumes: []

volumeMounts:
  - name: postgres-storage
    mountPath: /var/lib/postgresql/data

probes:
  liveness:
    exec:
      command:
        - pg_isready
        - -U
        - appuser
        - -d
        - blog_db
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    exec:
      command:
        - pg_isready
        - -U
        - appuser
        - -d
        - blog_db
    initialDelaySeconds: 5
    periodSeconds: 5

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
