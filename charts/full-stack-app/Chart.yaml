apiVersion: v2
name: fullstack-app
description: Fullstack application with Next.js, Spring Boot, and PostgreSQL
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: frontend
    version: 0.1.0
    repository: file://../frontend
    condition: frontend.enabled
  - name: backend
    version: 0.1.0
    repository: file://../backend
    condition: backend.enabled
  - name: postgres
    version: 0.1.0
    repository: file://../postgres
    condition: postgres.enabled
