# Full-stack application values

replicaCount: 1
# ─────────────────────────────────────────────
# Sub-chart value overrides
# Keys MUST match the dependency name so Helm
# passes them into the correct sub-chart scope.
# ─────────────────────────────────────────────
frontend:
  enabled: true
  image:
    repository: /prod-ui
    tag: "32769b8f"
    pullPolicy: Always
  config:
    NEXT_PUBLIC_API_URL: "/api"
    NEXT_PUBLIC_APP_NAME: "MyApp"
backend:
  enabled: true
  image:
    repository: tochratana/prod-api
    tag: "94317220"
    pullPolicy: Always
  config:
    SPRING_PROFILES_ACTIVE: "k8s"
    LOGGING_LEVEL_COM_EXAMPLE: "DEBUG"
    SERVER_PORT: "8080"
  database:
    name: blog_db
postgres:
  enabled: true
# ─────────────────────────────────────────────
# Ingress (rendered by full-stack-app/templates/ingress.yaml)
# ─────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: full-stack-dpl.tochratana.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 3000
        - path: /api
          pathType: Prefix
          service: backend
          port: 8080
  tls:
    - secretName: full-stack-dpl-tls
      hosts:
        - full-stack-dpl.tochratana.com
