# Frontend specific values
replicaCount: 1

image:
  repository: your-registry/frontend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP

ports:
  - name: http
    containerPort: 3000

config:
  NEXT_PUBLIC_API_URL: /api
  NEXT_PUBLIC_APP_NAME: "MyApp"

probes:
  liveness:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"
