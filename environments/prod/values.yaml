# Production environment overrides

replicaCount: 1

# Sub-chart image overrides (passed through to backend/frontend/postgres sub-charts)
backend:
  replicaCount: 1
  image:
    repository: tochratana/prod-api
    tag: "01d931c2"
    pullPolicy: Always

frontend:
  replicaCount: 1
  image:
    repository: tochratana/prod-ui
    tag: "b2518c6c"
    pullPolicy: Always

postgres:
  persistence:
    size: 10Gi
    storageClass: ""

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
  hosts:
    - host: full-stack-dpl.tochratana.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 3000
        - path: /api
          pathType: Prefix
          service: backend
          port: 8080
  tls:
    - secretName: full-stack-dpl-tls
      hosts:
        - full-stack-dpl.tochratana.com

config:
  frontend:
    NEXT_PUBLIC_API_URL: "/api"
    NEXT_PUBLIC_APP_NAME: "MyApp"
  backend:
    SPRING_PROFILES_ACTIVE: "k8s"
    LOGGING_LEVEL_COM_EXAMPLE: "INFO"
    SERVER_PORT: "8080"

resources:
  frontend:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  backend:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  postgres:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"